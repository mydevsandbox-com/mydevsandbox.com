<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        color: #e8edf8;
        background: radial-gradient(circle at 20% 20%, #ff7a1833, transparent 40%),
          radial-gradient(circle at 80% 70%, #1c8fff33, transparent 40%),
          linear-gradient(145deg, #070b17, #0e162a 45%, #151f38);
      }

      main {
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        padding: 2rem;
        background: rgba(17, 24, 47, 0.82);
      }

      a {
        color: #ffd08e;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>The page you are looking for does not exist.</p>
      <a href="/">Return to the homepage</a>
    </main>
  </body>
</html>
